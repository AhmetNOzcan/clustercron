services:
  postgres:
    image: postgres:16-alpine
    container_name: clustercron-postgres
    environment:
      POSTGRES_USER: clustercron
      POSTGRES_PASSWORD: clustercron
      POSTGRES_DB: clustercron
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clustercron -d clustercron"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clustercron-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  scheduler:
    build: .
    container_name: clustercron-scheduler
    environment:
      DATABASE_URL: postgres://clustercron:clustercron@postgres:5432/clustercron?sslmode=disable
      REDIS_URL: redis://redis:6379
      ROLE: scheduler
      NODE_ID: scheduler-1
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy      

  worker-1:
    build: .
    container_name: clustercron-worker-1
    environment:
      DATABASE_URL: postgres://clustercron:clustercron@postgres:5432/clustercron?sslmode=disable
      REDIS_URL: redis://redis:6379
      ROLE: worker
      NODE_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-2:
    build: .
    container_name: clustercron-worker-2
    environment:
      DATABASE_URL: postgres://clustercron:clustercron@postgres:5432/clustercron?sslmode=disable
      REDIS_URL: redis://redis:6379
      ROLE: worker
      NODE_ID: worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy        

volumes:
  postgres_data:
  redis_data: