services:
  postgres:
    image: postgres:16-alpine
    container_name: clustercron-postgres
    environment:
      POSTGRES_USER: clustercron
      POSTGRES_PASSWORD: clustercron
      POSTGRES_DB: clustercron
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clustercron -d clustercron"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clustercron-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  node-1:
    build: .
    container_name: clustercron-node-1
    environment:
      DATABASE_URL: postgres://clustercron:clustercron@postgres:5432/clustercron?sslmode=disable
      REDIS_URL: redis://redis:6379
      NODE_ID: node-1
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  node-2:
    build: .
    container_name: clustercron-node-2
    environment:
      DATABASE_URL: postgres://clustercron:clustercron@postgres:5432/clustercron?sslmode=disable
      REDIS_URL: redis://redis:6379
      NODE_ID: node-2
      HTTP_PORT: "8080"
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  node-3:
    build: .
    container_name: clustercron-node-3
    environment:
      DATABASE_URL: postgres://clustercron:clustercron@postgres:5432/clustercron?sslmode=disable
      REDIS_URL: redis://redis:6379
      NODE_ID: node-3
      HTTP_PORT: "8080"
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
        
volumes:
  postgres_data:
  redis_data: