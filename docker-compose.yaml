services:
  postgres:
    image: postgres:16-alpine
    container_name: clustercron-postgres
    environment:
      POSTGRES_USER: clustercron
      POSTGRES_PASSWORD: clustercron
      POSTGRES_DB: clustercron
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clustercron -d clustercron"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clustercron-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data: